<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #242424;
      background: #f6f7f9;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(90vw, 720px);
      padding: 48px 24px;
      text-align: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1.1;
    }

    p {
      margin: 0;
      font-size: 1.125rem;
      line-height: 1.8;
      color: #555;
    }
  </style>
</head>
<body>
  <main>
    <h1>Welcome to My Website</h1>
    <p>GitHub Pagesで公開するシンプルなWebサイトです。</p>
  </main>
</body>
</html>
